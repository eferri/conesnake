---
apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}-relay-external"
  labels:
    {{- include "common_labels" . | nindent 4 }}
spec:
  type: NodePort
  ports:
  - port: 8080
    targetPort: 8080
    nodePort: 30001
  selector:
    {{- include "common_labels" . | nindent 4 }}
    app: relay

---
apiVersion: v1
kind: Service
metadata:
  name: "{{ .Release.Name }}-relay"
  labels:
    {{- include "common_labels" . | nindent 4 }}
spec:
  ports:
  - port: 8080
  clusterIP: None
  selector:
    {{- include "common_labels" . | nindent 4 }}
    app: relay

{{- range $worker := .Values.workers }}
---
apiVersion: v1
kind: Service
metadata:
  name: "{{ $.Release.Name }}-worker-{{ $worker.hostname }}"
  labels:
    {{- include "common_labels" $ | nindent 4 }}
spec:
  ports:
  - port: 8080
    targetPort: 8080
  clusterIP: None
  selector:
    {{- include "common_labels" $ | nindent 4 }}
    app: worker
    node: "worker-{{ $worker.hostname }}"
{{- end }}
