[package]
name = "treesnake"
version = "0.2.0"
edition = "2021"

[[bin]]
name = "treesnake"
path = "./src/bin/treesnake.rs"

[dependencies]
tiny_http = { version = "0.11", features = ["ssl-rustls"] }
crossbeam-channel = "0.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rand = "0.8"
clap = { version = "3.2", features = ["derive"] }
ctrlc =  { version = "3.2", features = ["termination"] }
log = "0.4"
env_logger = "0.9"
libc = "0.2"

[dev-dependencies]
ureq = "2.4"
approx = "0.5"
pprof = { version = "0.10", features = ["protobuf-codec"] }

[features]
profile = []

[profile.release]
lto = "thin"

[profile.release-with-debug]
inherits = "release"
debug = true
