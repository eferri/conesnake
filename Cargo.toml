[package]
name = "conesnake"
version = "0.2.0"
edition = "2021"

[[bin]]
name = "conesnake"
path = "./src/bin/conesnake.rs"

[[bin]]
name = "profile"
path = "./src/bin/profile.rs"

[dependencies]
tiny_http = { version = "0.12" }
crossbeam-channel = "0.5"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
rand = { version = "0.8", features = ["small_rng"] }
clap = { version = "4.0", features = ["derive"] }
ctrlc =  { version = "3.2", features = ["termination"] }
log = "0.4"
env_logger = "0.10"
num_cpus = "1"
ureq = {version = "2.5", features = ["json"]}
deepsize = "0.2"

[dev-dependencies]
approx = "0.5"
pretty_assertions = "1.3"

[profile.release]
lto = "thin"

[profile.release-with-debug]
inherits = "release"
debug = true
