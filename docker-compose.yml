services:
  snake:
    image: snake_dev:latest
    build:
      target: dev
      args:
        UID: ${UID}
        GID: ${GID}
    environment:
      - RUST_BACKTRACE
      - TARGET
    volumes:
      - .:/app
    ports:
      - 8080:8080
    command: |
      ./entrypoint.sh \
        --max-boards 500000 \
        --max-width 11 \
        --max-height 11

  gpu:
    build:
      context: gpu
      target: dev
      args:
        UID: ${UID}
        GID: ${GID}
    volumes:
      - .:/app

  rules:
    image: snake_dev:latest
    network_mode: host
    command: |
      entrypoint_rules.sh \
        --browser \
        --board-url http://localhost:3000 \
        --timeout 200 \
        --width 6 --height 6 \
        --gametype standard \
        --map standard \
        --foodSpawnChance 10 \
        --hazardDamagePerTurn 100 \
        --name treesnake --url http://localhost:8080
    depends_on:
      - snake

  board:
    build:
      context: submodules/board
      target: build
    ports:
      - 3000:3000
    command: [ "npm", "run", "start" ]

  snork:
    build:
      context: submodules/snork
      args:
        UID: ${UID}
        GID: ${GID}
    command: |
      cargo run --release -- --host 0.0.0.0:8082
