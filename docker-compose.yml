---
services:
  snake:
    image: conesnake:latest-dev
    build:
      target: dev
      args:
        UID: ${UID}
        GID: ${GID}
    environment:
      - RUST_BACKTRACE
      - TARGET
      - NUM_THREADS
      - NUM_WORKERS
      - MAX_BOARDS
      - MAX_WIDTH
      - MAX_HEIGHT
      - MAX_SNAKES
    volumes:
      - ".:/app"
    ports:
      - "8080:8080"
    cap_add:
      - CAP_PERFMON
      - CAP_SYSLOG
    command: |
      scripts/entrypoint_relay.sh \
        --port 8080 \
        --max-boards 0 \
        --max-width ${MAX_WIDTH:-11} \
        --max-height ${MAX_HEIGHT:-11} \
        --max-snakes ${MAX_SNAKES:-4} \
        --num-parallel-reqs 1 \
        --worker-node worker \
        --worker-pod http://worker-0:8081 \
        --worker-pod http://worker-1:8081 \
        --mode relay

  worker-0: &worker
    image: conesnake:latest-dev
    environment:
      - RUST_BACKTRACE
      - TARGET
    volumes:
      - ".:/app"
    command: |
      scripts/entrypoint.sh \
        --port 8081 \
        --num-threads ${NUM_THREADS:-4} \
        --max-boards ${MAX_BOARDS:-10000} \
        --max-width ${MAX_WIDTH:-11} \
        --max-height ${MAX_HEIGHT:-11} \
        --max-snakes ${MAX_SNAKES:-4} \
        --mode worker

  worker-1:
    <<: *worker

  opponent-0: &opponent
    image: conesnake:latest-dev
    environment:
      - RUST_BACKTRACE
      - TARGET=release
    volumes:
      - ".:/app"
    command: |
      scripts/entrypoint.sh \
        --port 8082 \
        --num-threads ${NUM_THREADS:-4} \
        --max-boards ${MAX_BOARDS:-10000} \
        --max-width ${MAX_WIDTH:-11} \
        --max-height ${MAX_HEIGHT:-11} \
        --max-snakes ${MAX_SNAKES:-4} \
        --mode worker
    ports:
      - "8082:8082"

  opponent-1:
    <<: *opponent
    ports:
      - "8083:8082"

  rules:
    image: conesnake:latest-dev
    network_mode: host
    volumes:
      - ".:/app"
    command: |
      scripts/entrypoint_rules.sh \
        --browser \
        --board-url http://localhost:5173 \
        --timeout 500 \
        --width 11 --height 11 \
        --gametype standard \
        --map standard \
        --foodSpawnChance 15 \
        --hazardDamagePerTurn 16 \
        --name conesnake --url http://localhost:8080 \
        --name opponent-0 --url http://localhost:8082 \
        --name opponent-1 --url http://localhost:8083 \

  board:
    build:
      context: submodules/board
    ports:
      - "5173:5173"
    command: |
      npm run dev
