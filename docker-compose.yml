---
services:
  snake:
    image: conesnake:latest-dev
    build:
      target: dev
      args:
        UID: ${UID}
        GID: ${GID}
        KERNEL_VER: ${KERNEL_VER}
    environment:
      - RUST_BACKTRACE
      - TARGET
    volumes:
      - ".:/app"
    ports:
      - "8080:8080"
    security_opt:
      - seccomp:.devcontainer/seccomp-perf.json
    command: |
      scripts/entrypoint_relay.sh \
        --max-boards 0 \
        --max-width ${MAX_WIDTH:-11} \
        --max-height ${MAX_HEIGHT:-11} \
        --max-snakes ${MAX_SNAKES:-4} \
        --worker http://worker:8081,1 \
        relay

  worker:
    image: conesnake:latest-dev
    build:
      target: dev
      args:
        UID: ${UID}
        GID: ${GID}
        KERNEL_VER: ${KERNEL_VER}
    environment:
      - RUST_BACKTRACE
      - TARGET
    volumes:
      - ".:/app"
    ports:
      - "8081:8081"
    command: |
      scripts/entrypoint.sh \
        --port 8081 \
        --num-threads ${NUM_THREADS:-4} \
        --max-boards ${MAX_BOARDS:-10000} \
        --max-width ${MAX_WIDTH:-11} \
        --max-height ${MAX_HEIGHT:-11} \
        --max-snakes ${MAX_SNAKES:-5} \
        worker

  rules:
    image: conesnake:latest-dev
    network_mode: host
    volumes:
      - ".:/app"
    command: |
      scripts/entrypoint_rules.sh \
        --browser \
        --board-url http://localhost:3000 \
        --timeout 250 \
        --width 11 --height 11 \
        --gametype wrapped \
        --map hz_islands_bridges \
        --foodSpawnChance 10 \
        --hazardDamagePerTurn 100 \
        --name conesnake --url http://localhost:${LISTEN_PORT:-8080}
    depends_on:
      - snake

  board:
    build:
      context: submodules/board
      target: build
    ports:
      - "3000:3000"
    command: |
      npm run start
