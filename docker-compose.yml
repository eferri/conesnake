---
services:
  snake:
    image: conesnake:latest-dev
    build:
      target: dev
      args:
        UID: ${UID}
        GID: ${GID}
    environment:
      - RUST_BACKTRACE
      - TARGET
    volumes:
      - ".:/app"
    ports:
      - "8080:8080"
    command: |
      scripts/entrypoint.sh \
        --num-threads ${NUM_THREADS:-4} \
        --max-boards ${MAX_BOARDS:-10000} \
        --max-width ${MAX_WIDTH:-11} \
        --max-height ${MAX_HEIGHT:-11} \
        --worker worker
        relay

  worker:
    image: conesnake:latest-dev
    build:
      target: dev
      args:
        UID: ${UID}
        GID: ${GID}
    environment:
      - RUST_BACKTRACE
      - TARGET
    volumes:
      - ".:/app"
    ports:
      - "8081:8081"
    command: |
      scripts/entrypoint.sh \
        --port 8081 \
        --num-threads ${NUM_THREADS:-4} \
        --max-boards ${MAX_BOARDS:-10000} \
        --max-width ${MAX_WIDTH:-11} \
        --max-height ${MAX_HEIGHT:-11} \
        worker

  gpu:
    build:
      context: gpu
      target: dev
      args:
        UID: ${UID}
        GID: ${GID}
    volumes:
      - ".:/app"

  rules:
    image: conesnake:latest-dev
    network_mode: host
    volumes:
      - ".:/app"
    command: |
      scripts/entrypoint_rules.sh \
        --browser \
        --board-url http://localhost:3000 \
        --timeout 250 \
        --width 5 --height 5 \
        --gametype standard \
        --map standard \
        --foodSpawnChance 10 \
        --hazardDamagePerTurn 100 \
        --name treesnake --url http://localhost:${LISTEN_PORT:-8080}
    depends_on:
      - worker
      - snake

  board:
    build:
      context: submodules/board
      target: build
    ports:
      - "3000:3000"
    command: |
      npm run start

  snork:
    build:
      context: submodules/snork
      args:
        UID: ${UID}
        GID: ${GID}
    command: |
      cargo run --release -- --host 0.0.0.0:8082
